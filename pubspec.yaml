name: kisses_app
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  # Для графіків
  fl_chart: ^1.1.1 
  # Для календаря
  table_calendar: ^3.1.2 
  # Для форматування дат
  intl: ^0.20.2 
  # Для зручної роботи зі станом
  provider: ^6.1.2 
  # Для групування даних (collection)
  collection: ^1.18.0
  # Для реалізації збереження даних на Android
  shared_preferences: ^2.2.2
  flutter_localizations:
    sdk: flutter
  # Звук
  audioplayers: ^6.0.0
  # Про програму
  package_info_plus: ^9.0.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  # 🔥 Вмикаємо автоматичну генерацію локалізації
  generate: true 
  assets:
    - assets/sounds/