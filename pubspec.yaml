name: kisses_app
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  # Cupertino icons font (used by the iOS page-transition builder)
  cupertino_icons: ^1.0.8
  # Charts
  fl_chart: ^1.1.1
  # Calendar
  table_calendar: ^3.1.2
  # Date formatting
  intl: ^0.20.2
  # State management
  provider: ^6.1.2
  # Grouping helpers (collection)
  collection: ^1.18.0
  # Local persistence
  shared_preferences: ^2.2.2
  flutter_localizations:
    sdk: flutter
  # Sound
  audioplayers: ^6.0.0
  # App / build info
  package_info_plus: ^9.0.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  # Enable automatic localization (gen-l10n) generation
  generate: true
  assets:
    - assets/sounds/